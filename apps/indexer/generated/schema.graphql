"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

scalar BigInt

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ViewPageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type Meta {
  status: JSON
}

type Query {
  vaults(id: String!): vaults
  vaultss(where: vaultsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): vaultsPage!
  vaultTransactions(id: String!): vaultTransactions
  vaultTransactionss(where: vaultTransactionsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): vaultTransactionsPage!
  balanceEvents(id: String!): balanceEvents
  balanceEventss(where: balanceEventsFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): balanceEventsPage!
  _meta: Meta
}

